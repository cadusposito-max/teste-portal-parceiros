<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Proposta - Agil Solar</title>
    <link rel="icon" type="image/png" href="assets/img/icon.png">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #050505;
            color: #a3a3a3;
            font-family: Inter, Arial, sans-serif;
        }
    </style>
</head>
<body>
    <p>Carregando proposta...</p>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var view = (params.get('view') || '').toLowerCase();
            var explicitPrint = view === 'print' || params.get('print') === '1';
            var target = explicitPrint
                ? 'proposta-print.html'
                : (view === 'mobile'
                    ? 'proposta-mobile.html'
                    : (view === 'desktop'
                        ? 'proposta-desktop.html'
                        : (window.matchMedia('(min-width: 768px)').matches ? 'proposta-desktop.html' : 'proposta-mobile.html')));

            window.location.replace(target + window.location.search + window.location.hash);
        })();
    </script>
    <noscript>
        <a href="proposta-mobile.html">Abrir proposta</a>
    </noscript>
</body>
</html>
